name: Contracts CI

on:
  pull_request:
    paths:
      - "packages/contracts/**"
      - "apps/api/**"
      - "apps/web/**"
      - "docs/architecture/spatial-analysis-openapi.yaml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/contracts-ci.yml"
  push:
    paths:
      - "packages/contracts/**"
      - "apps/api/**"
      - "apps/web/**"
      - "docs/architecture/spatial-analysis-openapi.yaml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/contracts-ci.yml"

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts + OpenAPI Envelope
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contracts CI checks
        run: bun run ci:contracts
